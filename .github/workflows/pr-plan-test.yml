#####################################################################
# FUTURE-SELF NOTES
# File: pr-plan-test.yml
# Lab: Advanced Terraform on AWS - Lab 6B Part 3
# Purpose: Environment-scoped PR plan workflow for TEST.
# Role: PLAN ONLY: runs during pull requests so the reviewer can see what Terraform would do. It must never run terraform apply.
#
# Why this file exists:
# - Replaces the earlier central change-all workflow pattern.
# - Keeps DEV, TEST and PROD execution isolated.
# - Avoids running unrelated environments when only one environment changed.
# - Preserves the Lab 6A promotion model: promotion is a pinned module ref change.
#
# Important teaching distinction:
# - pr-plan-*.yml = proposal visibility only; init/validate/plan; no apply.
# - change-*.yml  = accepted change execution; init/validate/plan/apply.
#
# AWS notes:
# - Authentication uses GitHub OIDC and AWS_ROLE_ARN.
# - Terraform state is in S3.
# - Locking uses native S3 lock files via use_lockfile=true.
# - No DynamoDB locking table is required.
#
# Future-lab hook:
# - FEATURE_PHASE is intentionally present now.
# - In Lab 6B it stays at 1.
# - Later labs can raise it to enable intent and ownership governance.
#####################################################################

# Workflow name as shown on the GitHub Actions tab.
name: pr-plan-test

# Trigger: run when a pull request targets main AND changes this environment folder.
# This lets reviewers inspect the plan before the change is merged.
# Path scoping is deliberate: a DEV PR should not run TEST or PROD planning.
on:
  pull_request:
    branches:
      - main
    paths:
      - 'envs/test/**'

# Permissions required by the workflow.
# id-token: write allows GitHub OIDC to request short-lived AWS credentials.
# contents: read allows the workflow to check out the repository.
# pull-requests: read allows the workflow to inspect PR context where needed.
permissions:
  id-token: write
  contents: read
  pull-requests: read

# Shared workflow settings.
# FEATURE_PHASE is the important future-proofing switch.
#   1 = Environment-scoped plan/apply only.
#   2 = Enable explicit intent governance in later labs.
#   3 = Enable ownership governance in later labs.
# ENV_DIR, STATE_KEY and VAR_FILE keep this workflow locked to TEST.
env:
  FEATURE_PHASE: "1"  # 1=No governance, 2=Intent governance, 3=Intent + Ownership
  ENV_DIR: "envs/test"
  EXPECTED_ENV: "test"
  PROMOTION_TFVARS: "envs/test/test-promotion.tfvars"
  STATE_KEY: "test.tfstate"
  VAR_FILE: "test.tfvars"
  PIPELINE_LABEL: "PR Plan pipeline (TEST)"
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}

# Jobs section.
# There is intentionally only one job so that the lab flow remains easy to follow.
jobs:
  plan-test:
    name: Governance gate + Terraform plan (test)
    runs-on: ubuntu-latest

    steps:
      # Fetch the environment root code and enough Git history for governance checks.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Exchange the GitHub OIDC token for short-lived AWS credentials.
      # This avoids storing AWS access keys in GitHub.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Install Terraform on the GitHub-hosted runner.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Governance gate + Terraform plan (test)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # -----------------
          # Context + paths
          # -----------------
          $envDir     = $env:ENV_DIR
          $envKey     = $env:EXPECTED_ENV
          $intentFile = $env:PROMOTION_TFVARS
          $stateKey   = $env:STATE_KEY
          $varFile    = $env:VAR_FILE
          $mainTf     = Join-Path $envDir "main.tf"
          $ownersFile = "governance/owners.yml"

          # GitHub does not reliably expose a verified email address for the actor.
          # For lab governance, use the most recent commit author email as the accountable actor.
          $actorName = $env:GITHUB_ACTOR
          try { $actorEmail = (git log -1 --format="%ae").Trim().ToLower() } catch { $actorEmail = "" }
          if ([string]::IsNullOrWhiteSpace($actorEmail)) { $actorEmail = "$($actorName.Trim().ToLower())@users.noreply.github.com" }

          # ------------------
          # Feature phase model
          # ------------------
          $phaseRaw = $env:FEATURE_PHASE
          if ([string]::IsNullOrWhiteSpace($phaseRaw)) { $phaseRaw = "1" }

          try { $phase = [int]$phaseRaw } catch { throw "Invalid FEATURE_PHASE value: '$phaseRaw' (expected 1, 2, or 3)." }
          if ($phase -lt 1 -or $phase -gt 3) { throw "Invalid FEATURE_PHASE value: '$phaseRaw' (expected 1, 2, or 3)." }

          $enableIntent     = $phase -ge 2
          $enableOwners     = $phase -ge 3
          $enableClassify   = $enableIntent
          $enableBlockBad   = $enableIntent
          $enableMixedWarn  = $enableIntent
          $enableRefCompare = $enableIntent

          # -------
          # Header
          # -------
          Write-Host "======================================"
          Write-Host "$($env:PIPELINE_LABEL)"
          Write-Host "======================================"
          Write-Host "Environment directory : $envDir"
          Write-Host "Main.tf               : $mainTf"
          Write-Host "Intent file           : $intentFile"
          Write-Host "Owners file           : $ownersFile"
          Write-Host "Actor                 : $actorName <$actorEmail>"
          Write-Host ""

          Write-Host "Feature phase:"
          switch ($phase) {
            1 { Write-Host " - PHASE             : 1 (No governance; Terraform runs after basic checks)" }
            2 { Write-Host " - PHASE             : 2 (Intent governance; malformed promotions blocked)" }
            3 { Write-Host " - PHASE             : 3 (Intent + Ownership governance)" }
          }
          Write-Host ""

          Write-Host "Enabled features:"
          Write-Host " - INTENT (classify) : $enableClassify"
          Write-Host " - INTENT (enforce)  : $enableBlockBad"
          Write-Host " - MIXED WARNING     : $enableMixedWarn"
          Write-Host " - REF MATCH CHECK   : $enableRefCompare"
          Write-Host " - OWNERSHIP         : $enableOwners"
          Write-Host ""

          if (-not (Test-Path -LiteralPath $mainTf)) { throw "main.tf not found under $envDir." }
          if ($enableOwners) {
            if (-not (Test-Path -LiteralPath $ownersFile)) { throw "Ownership file not found: $ownersFile. Environment ownership is not defined." }
          }

          # ============================================================
          # Defaults
          # ============================================================
          $changeType    = "ENV_ROOT_CHANGE"
          $allowedOwners = New-Object System.Collections.Generic.List[string]
          $refChanged    = $false
          $hasParent     = $true
          $changedIntent = @()
          $changedOwners = @()

          # ============================================================
          # Owners.yml parsing helper (supports environments: wrapper)
          # ============================================================
          function Get-OwnersList {
            param(
              [Parameter(Mandatory)][string]$EnvKeyLower,
              [Parameter(Mandatory)][string]$Raw,
              [Parameter(Mandatory)][string]$OwnersPath
            )

            $rawN = $Raw -replace "`r`n", "`n"

            $p1 = "(?ms)^\s*environments\s*:\s*\n(?<envs>(?:\s{2,}.*\n)+)"
            $m1 = [regex]::Match($rawN, $p1)
            if ($m1.Success) {
              $envs = $m1.Groups["envs"].Value

              $pEnv = "(?ms)^\s{2,}${EnvKeyLower}\s*:\s*\n(?<body>(?:\s{4,}.*\n)+)"
              $mEnv = [regex]::Match($envs, $pEnv)
              if (-not $mEnv.Success) { throw "No owners defined for environment '$EnvKeyLower' in $OwnersPath" }

              $body = $mEnv.Groups["body"].Value
              $pOwners = "(?ms)^\s{4,}owners\s*:\s*\n(?<list>(?:\s{6,}-\s*[^\n]+\n)+)"
              $mOwners = [regex]::Match($body, $pOwners)
              if (-not $mOwners.Success) { throw "No owners defined for environment '$EnvKeyLower' in $OwnersPath" }

              return @(
                ($mOwners.Groups["list"].Value -split "`n") |
                  ForEach-Object { $_.Trim() } |
                  Where-Object { $_ -like "- *" } |
                  ForEach-Object { $_.Substring(2).Trim().ToLower() }
              )
            }

            $p2 = "(?ms)^\s*${EnvKeyLower}\s*:\s*\n\s*owners\s*:\s*\n(?<list>(?:\s*-\s*[^\r\n]+\s*\n)+)"
            $m2 = [regex]::Match($rawN, $p2)
            if (-not $m2.Success) { throw "No owners defined for environment '$EnvKeyLower' in $OwnersPath" }

            return @(
              ($m2.Groups["list"].Value -split "`n") |
                ForEach-Object { $_.Trim() } |
                Where-Object { $_ -like "- *" } |
                ForEach-Object { $_.Substring(2).Trim().ToLower() }
            )
          }

          # ============================================================
          # Ownership model
          # ============================================================
          $envKeyLower = $envKey.Trim().ToLower()
          if ($enableOwners) {
            $raw = Get-Content -LiteralPath $ownersFile -Raw
            $raw = $raw -replace "`r`n", "`n"

            $vals = @(Get-OwnersList -EnvKeyLower $envKeyLower -Raw $raw -OwnersPath $ownersFile)
            foreach ($v in $vals) {
              $t = ($v -replace "[\uFEFF\u200B\u200C\u200D]", "").Trim().ToLower()
              if (-not [string]::IsNullOrWhiteSpace($t)) { $allowedOwners.Add($t) }
            }
            if ($allowedOwners.Count -eq 0) { throw "No owners defined for environment '$envKeyLower' in $ownersFile" }

            Write-Host "Allowed owners ($envKeyLower):"
            $allowedOwners | Sort-Object | ForEach-Object { Write-Host " - $_" }
            Write-Host ""
          } else {
            Write-Host "[OWNERSHIP] Feature disabled in current phase."
            Write-Host ""
          }

          # ============================================================
          # Promotion intent validation
          # ============================================================
          function Validate-PromotionIntent {
            param(
              [Parameter(Mandatory=$true)][string]$IntentFile,
              [Parameter(Mandatory=$true)][string]$MainTf,
              [Parameter(Mandatory=$true)][string]$ExpectedEnv
            )

            if (-not (Test-Path -LiteralPath $IntentFile)) { throw "Promotion intent file not found: $IntentFile. Promotion is not explicitly declared." }
            if (-not (Test-Path -LiteralPath $MainTf))     { throw "Main Terraform file not found: $MainTf." }

            $intentRaw = Get-Content -LiteralPath $IntentFile -Raw
            $envRoot = Split-Path -Parent $MainTf
            $tfFiles = Get-ChildItem -LiteralPath $envRoot -Filter *.tf -File -Recurse
            if (-not $tfFiles -or $tfFiles.Count -eq 0) { throw "No .tf files found under env root: $envRoot" }

            $allTfRaw = ($tfFiles | ForEach-Object { Get-Content -LiteralPath $_.FullName -Raw }) -join "`n"

            Write-Host "=== Promotion intent validation ==="

            $envMatch = [regex]::Match($intentRaw, '(?m)^\s*promotion_environment\s*=\s*"?([^"\r\n]+)"?\s*$')
            if (-not $envMatch.Success) { throw "promotion_environment is missing from $IntentFile." }

            $declaredEnv = $envMatch.Groups[1].Value.Trim()
            if ($declaredEnv -ne $ExpectedEnv) { throw "Intent mismatch: promotion_environment='$declaredEnv' does not match pipeline target '$ExpectedEnv'." }

            Write-Host "Declared environment     : $declaredEnv"

            $mapMatch = [regex]::Match($intentRaw, '(?s)approved_refs\s*=\s*\{(.*?)\}')
            if (-not $mapMatch.Success) { throw "approved_refs map not found in $IntentFile." }

            $approved = @{}
            foreach ($pair in [regex]::Matches($mapMatch.Groups[1].Value, '(?m)^\s*([A-Za-z0-9_\-]+)\s*=\s*"?([^"\r\n]+)"?\s*$')) {
              $approved[$pair.Groups[1].Value.Trim()] = $pair.Groups[2].Value.Trim()
            }
            if ($approved.Count -eq 0) { throw "approved_refs exists but contains no entries." }

            Write-Host "Approved module refs:"
            $approved.Keys | Sort-Object | ForEach-Object { Write-Host " - $_ = $($approved[$_])" }

            $errors = @()
            foreach ($moduleName in ($approved.Keys | Sort-Object)) {
              $expectedRef = $approved[$moduleName]
              $pattern = '(?s)module\s+\"{0}\"\s*\{{.*?source\s*=\s*\"[^\"]*\?ref=([^\"&]+)[^\"]*\".*?\}}' -f [regex]::Escape($moduleName)
              $modMatch = [regex]::Match($allTfRaw, $pattern)

              if (-not $modMatch.Success) { $errors += "Module '$moduleName' not found with ?ref= in env root (*.tf) under $envRoot."; continue }

              $pinnedRef = $modMatch.Groups[1].Value.Trim()
              Write-Host "Pinned ref ($moduleName) : $pinnedRef"

              if ($pinnedRef -ne $expectedRef) { $errors += "Intent mismatch for '$moduleName': approved_refs='$expectedRef', actual='?ref=$pinnedRef'." }
            }

            if ($errors.Count -gt 0) { throw ($errors -join "`n") }
            Write-Host "Promotion intent validated successfully."
            Write-Host ""
          }

          # ============================================================
          # Change classification
          # ============================================================
          if ($enableClassify) {

            try { git rev-parse HEAD^1 | Out-Null } catch { $hasParent = $false }

            if (-not $hasParent) {
              Write-Host "WARNING: No parent commit found for HEAD. Defaulting to ENV_ROOT_CHANGE."
            }
            else {
              $changedIntent = @(git diff --name-only HEAD^1..HEAD -- $intentFile | Where-Object { $_ -and $_.Trim().Length -gt 0 })
              $changedOwners = @(git diff --name-only HEAD^1..HEAD -- $ownersFile | Where-Object { $_ -and $_.Trim().Length -gt 0 })

              Write-Host "DEBUG: changedIntentCount=$($changedIntent.Count)"
              Write-Host "DEBUG: changedOwnersCount=$($changedOwners.Count)"

              function Get-ModuleRefMap {
                param(
                  [Parameter(Mandatory)][string]$Commit,
                  [Parameter(Mandatory)][string]$EnvDir
                )

                $map = @{}
                $tfFiles = git ls-tree -r --name-only $Commit -- "$EnvDir/" | Where-Object { $_ -match '\.tf$' }

                foreach ($f in $tfFiles) {
                  try { $content = git show "${Commit}:${f}" } catch { continue }
                  $rx = '(?s)module\s+"(?<name>[^"]+)"\s*\{.*?source\s*=\s*"[^"]*\?ref=(?<ref>[^"&]+)'
                  foreach ($m in [regex]::Matches($content, $rx)) {
                    $map[$m.Groups["name"].Value.Trim()] = $m.Groups["ref"].Value.Trim()
                  }
                }
                return $map
              }

              $before = Get-ModuleRefMap "HEAD^1" $envDir
              $after  = Get-ModuleRefMap "HEAD"   $envDir

              $moduleSetChanged = $false
              $refValueChanged  = $false

              $beforeKeys = @($before.Keys)
              $afterKeys  = @($after.Keys)

              $added   = @($afterKeys  | Where-Object { -not $before.ContainsKey($_) })
              $removed = @($beforeKeys | Where-Object { -not $after.ContainsKey($_) })
              if ($added.Count -gt 0 -or $removed.Count -gt 0) { $moduleSetChanged = $true }

              foreach ($m in $beforeKeys) {
                if ($after.ContainsKey($m) -and $before[$m] -ne $after[$m]) { $refValueChanged = $true; break }
              }

              $promotionShaped = ($moduleSetChanged -or $refValueChanged)

              function Get-ApprovedRefsFromTfvars([string]$path) {
                $approved = @{}
                if (-not (Test-Path $path)) { return $approved }
                $t = Get-Content -Raw $path
                $m = [regex]::Match($t, 'approved_refs\s*=\s*\{(?<body>[^}]*)\}', 'Singleline')
                if (-not $m.Success) { return $approved }
                foreach ($line in ($m.Groups["body"].Value -split "`n")) {
                  $m2 = [regex]::Match($line, '^\s*(?<k>[A-Za-z0-9_-]+)\s*=\s*\"(?<v>[^\"]+)\"\s*$')
                  if ($m2.Success) { $approved[$m2.Groups["k"].Value.Trim()] = $m2.Groups["v"].Value.Trim() }
                }
                return $approved
              }

              $approved = Get-ApprovedRefsFromTfvars $intentFile
              $missingApproved = @()
              $mismatchedRefs  = @()
              foreach ($m in $after.Keys) {
                if (-not $approved.ContainsKey($m)) {
                  $missingApproved += $m
                } elseif ($approved[$m] -ne $after[$m]) {
                  $mismatchedRefs += ("{0} (approved={1} actual={2})" -f $m, $approved[$m], $after[$m])
                }
              }
              $refsCoveredByIntent = (($missingApproved.Count -eq 0) -and ($mismatchedRefs.Count -eq 0))

              if ($promotionShaped) {
                if ($refsCoveredByIntent -and $changedIntent.Count -gt 0) { $changeType = "PROMOTION_INTENT" }
                else { $changeType = "IMPLICIT_PROMOTION_ATTEMPT" }
              } elseif ($changedIntent.Count -gt 0) {
                $changeType = "NOOP_PROMOTION_INTENT"
              }
            }

            Write-Host "=== Change classification ==="
            Write-Host "DEBUG: changedIntentCount=$($changedIntent.Count)"
            Write-Host "DEBUG: changedOwnersCount=$($changedOwners.Count)"
            Write-Host "Change type : $changeType"
            Write-Host ""
          } else {
            Write-Host "[CLASSIFY] Feature disabled in current phase."
            Write-Host ""
          }

          # ============================================================
          # Malformed promotion blocking
          # ============================================================
          if ($enableBlockBad) {
            if ($changeType -eq "IMPLICIT_PROMOTION_ATTEMPT") {
              $msg = @(
                "IMPLICIT PROMOTION ATTEMPT", "", "Environment : $envKey",
                "A module ref was changed (e.g. ?ref=...) but no corresponding update was made to the promotion intent file.",
                "Promotion must be explicitly declared: pinned ref change + promotion.tfvars change (same commit).", "",
                "Terraform execution has been blocked BEFORE init/plan/apply."
              ) -join "`n"
              Write-Host "::error::$msg"
              throw "Blocked: pinned module ref changed without explicit promotion intent."
            }

            if ($changeType -eq "NOOP_PROMOTION_INTENT") {
              $msg = @(
                "NO-OP PROMOTION INTENT", "", "Environment : $envKey",
                "The promotion intent file was updated, but no pinned module ref change was detected.",
                "This would record a 'promotion intent' without an actual promotion.", "",
                "Terraform execution has been blocked BEFORE init/plan/apply."
              ) -join "`n"
              Write-Host "::error::$msg"
              throw "Blocked: promotion intent updated without a pinned module ref change."
            }
          }

          # ============================================================
          # Ownership enforcement
          # ============================================================
          if ($enableOwners) {

            if ($changeType -eq "ENV_ROOT_CHANGE") {
              Write-Host "=== Environment change governance ==="
              Write-Host "Accountable actor       : $actorName <$actorEmail>"

              if ([string]::IsNullOrWhiteSpace($actorEmail)) { throw "Unable to determine actor email." }

              if ($allowedOwners -notcontains $actorEmail) {
                $msg = @(
                  "UNAUTHORISED ENVIRONMENT CHANGE", "", "Environment : $envKey",
                  "Actor       : $actorName <$actorEmail>", "", "This environment may only be changed by:",
                  ($allowedOwners | Sort-Object), "", "Terraform execution has been blocked BEFORE init/plan/apply."
                ) -join "`n"
                Write-Host "::error::$msg"
                throw "Ownership violation: actor is not permitted to change $envKey."
              }

              Write-Host "Environment change governance PASSED."
              Write-Host ""
            }

            if ($changeType -eq "PROMOTION_INTENT") {
              Write-Host "=== Promotion governance (Ownership) ==="

              $authorRaw = git log -1 --format="%ae|%an" -- $intentFile
              if ([string]::IsNullOrWhiteSpace($authorRaw)) { throw "Unable to determine author of intent file: $intentFile" }

              $authorEmail, $authorName2 = $authorRaw.Split("|", 2)
              $authorEmail = $authorEmail.Trim().ToLower()
              $authorName2 = $authorName2.Trim()

              Write-Host "Intent author           : $authorName2 <$authorEmail>"

              if ($allowedOwners -notcontains $authorEmail) {
                $msg = @(
                  "UNAUTHORISED PROMOTION INTENT", "", "Environment : $envKey", "Intent file  : $intentFile",
                  "Author       : $authorName2 <$authorEmail>", "", "This environment may only be promoted by:",
                  ($allowedOwners | Sort-Object), "", "Terraform execution has been blocked BEFORE init/plan/apply."
                ) -join "`n"
                Write-Host "::error::$msg"
                throw "Ownership violation: intent author is not permitted to promote $envKey."
              }

              Write-Host "Ownership validation PASSED."
              Write-Host ""
            }
          }

          # ============================================================
          # Mixed-change visibility
          # ============================================================
          if ($enableMixedWarn) {
            if ($changeType -eq "PROMOTION_INTENT" -and $hasParent) {
              $envDirNormalized = $envDir.TrimEnd('\','/').Replace('\','/')
              $mainTfNormalized = $mainTf.Replace('\','/')
              $intentNormalized = $intentFile.Replace('\','/')

              $allEnvChanges = @(git diff --name-only HEAD^1..HEAD -- "${envDirNormalized}/")
              $extraEnvChanges = @($allEnvChanges | Where-Object { $_ -and $_ -ne $mainTfNormalized -and $_ -ne $intentNormalized })

              if ($extraEnvChanges.Count -gt 0) {
                $msg = "PROMOTION detected. Note: Non-standard promotion and/or other changes were found in ${envDirNormalized}: $($extraEnvChanges -join ', ')"
                Write-Host "::warning::$msg"
                Write-Host ""
                $extraEnvChanges | ForEach-Object { Write-Host " - $_" }
                Write-Host ""
              }
            }
          }

          # ============================================================
          # Promotion intent validation — run only for explicit promotions
          # ============================================================
          if ($changeType -eq "PROMOTION_INTENT") {
            if (-not $enableIntent) { throw "Promotion intent validation is required for promotions, but the feature is disabled." }
            Validate-PromotionIntent -IntentFile $intentFile -MainTf $mainTf -ExpectedEnv $envKey
          }

          # ============================================================
          # Terraform execution (plan only)
          # ============================================================
          Write-Host "=== Terraform execution (plan only) ==="
          Write-Host "Change type (final)   : $changeType"
          Write-Host ""

          cd $envDir
          terraform --version

          # Configure the S3 remote backend for this environment.
          # STATE_KEY keeps DEV/TEST/PROD state separate.
          # use_lockfile=true enables Terraform S3 native lock files.
          $backendArgs = @(
            "-reconfigure",
            "-backend-config=bucket=$env:TF_BACKEND_BUCKET",
            "-backend-config=key=$stateKey",
            "-backend-config=region=$env:AWS_REGION"
          )

          $backendArgs += "-backend-config=use_lockfile=true"

          terraform init @backendArgs
          terraform validate

          $planPath = Join-Path $env:RUNNER_TEMP "tfplan-$envKey"
          $planArgs = @("-no-color", "-input=false", "-out", $planPath)
          if (-not [string]::IsNullOrWhiteSpace($varFile) -and (Test-Path -LiteralPath $varFile)) {
            $planArgs += "-var-file=$varFile"
          }
          # Final action for PR plan workflows.
          # Stop here: this workflow deliberately does not run terraform apply.
          terraform plan @planArgs
